<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Test</title>
  </head>
  <body>
    <h2>Supabase connectivity test (public.leads)</h2>

    <div id="status">Starting…</div>
    <ul id="list"></ul>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = 'https://uwauubdwvxpfgfkagqqx.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_inrERwvaOAuOJNOSqXHBPQ_J6VCxrB9';

      if (!window.supabaseClient) {
        const supabaseLib = window.supabase;
        window.supabaseClient = supabaseLib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { persistSession: true, autoRefreshToken: true },
        });
      }

      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('list');

      async function run() {
        statusEl.textContent = 'Fetching leads…';

        const { data, error } = await window.supabaseClient
          .from('leads')
          .select('id, full_name, email, created_at')
          .order('created_at', { ascending: false })
          .limit(20);

        if (error) {
          statusEl.textContent = 'ERROR: ' + error.message;
          console.error(error);
          return;
        }

        const rows = data || [];
        statusEl.textContent = `OK. Rows: ${rows.length}`;

        listEl.innerHTML = '';
        for (const row of rows) {
          const li = document.createElement('li');
          li.textContent =
            `${row.full_name ?? '(no name)'} — ${row.email ?? '(no email)'} ` +
            `(${row.created_at ?? 'no created_at'})`;
          listEl.appendChild(li);
        }
      }

      run();
    </script>
  </body>
</html>
